<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Loja de Roupas da Joice</title>
</head>

<body>

    <!-- Cabeçalho -->
    <header>
        <h1>Loja Fashion</h1>

        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo principal -->
    <main>

        <!-- Seção de destaque -->
        <section>
            <h2>Novidades</h2>
            <p>Confira as últimas tendências da moda.</p>
        </section>

        <!-- Seção de produtos -->
        <section>

            <article>
                <h3>Camiseta</h3>
                <img src="imagens/camiseta.png" alt="Camiseta">
                <p>Camiseta confortável de algodão.</p>
                <button>Comprar</button>
            </article>

            <article>
                <h3>Calça Jeans</h3>
                <img src="imagens/calca.png" alt="Calça jeans">
                <p>Calça jeans moderna.</p>
                <button>Comprar</button>
            </article>

            <article>
                <h3>Jaqueta</h3>
                <img src="imagens/jaqueta.png" alt="Jaqueta">
                <p>Jaqueta estilosa de couro para inverno.</p>
                <button>Comprar</button>
            </article>

        </section>

    </main>

    <!-- Rodapé -->
    <footer>
        <p>© 2026 Loja da Joice </p>
    </footer>

</body>
</html>
